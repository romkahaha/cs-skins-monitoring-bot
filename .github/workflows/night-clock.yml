name: Night clock

on:
  schedule:
    - cron: "50,55 5 * * *"

permissions:
  contents: write

concurrency:
  group: automation-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nightly-level1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      STEAM_COOKIES: ${{ secrets.STEAM_COOKIES }}
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      CSFLOAT_API_KEY_2: ${{ secrets.CSFLOAT_API_KEY_2 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Rebase runtime state
        run: git pull --rebase

      - name: Nightly schedule gate
        id: gate
        shell: bash
        run: python -B automation/nightly/schedule_gate.py --mode nightly --start-hour 7 --end-hour 7 >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.gate.outputs.run_nightly != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.gate.outputs.run_nightly != 'false'
        run: python -m pip install -r requirements.txt

      - name: Run nightly level 1
        if: steps.gate.outputs.run_nightly != 'false'
        shell: bash
        run: python automation/nightly/run_level1.py --run-risk --skip-base

      - name: Mark nightly schedule success
        if: steps.gate.outputs.run_nightly != 'false'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p automation_runtime
          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/Prague"))
          payload = {
              "last_success_local_date": now.date().isoformat(),
              "last_success_local_time": now.isoformat(),
          }
          Path("automation_runtime/nightly_schedule_state.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit nightly runtime
        if: steps.gate.outputs.run_nightly != 'false'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation_runtime skin_homog/data_skins_big steam_listings/data/float_fit_rel_curves.json

          if git diff --cached --quiet; then
            echo "No nightly output changes to commit."
            exit 0
          fi

          git commit -m "Update nightly runtime [skip ci]"
          if git push; then
            exit 0
          fi

          echo "Push rejected; rebasing runtime commit and retrying."
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
