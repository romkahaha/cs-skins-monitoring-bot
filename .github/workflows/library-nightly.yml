name: Library nightly

on:
  workflow_dispatch:
    inputs:
      skip_risk:
        description: Skip nightly risk rebuild and use automation_runtime/risk_metrics_latest.csv
        required: false
        default: false
        type: boolean
      skip_base:
        description: Skip CSFloat base snapshot refresh
        required: false
        default: true
        type: boolean
permissions:
  contents: write

concurrency:
  group: automation-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nightly-level1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SKIP_RISK: ${{ github.event.inputs.skip_risk || 'false' }}
      SKIP_BASE: ${{ github.event.inputs.skip_base || 'true' }}
      STEAM_COOKIES: ${{ secrets.STEAM_COOKIES }}
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      CSFLOAT_API_KEY_2: ${{ secrets.CSFLOAT_API_KEY_2 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Rebase runtime state
        run: git pull --rebase

      - name: Run nightly level 1
        shell: bash
        run: |
          set -euo pipefail

          args=()
          if [[ "$SKIP_RISK" == "true" ]]; then
            args+=(--skip-risk)
          else
            args+=(--run-risk)
          fi

          if [[ "$SKIP_BASE" == "true" ]]; then
            args+=(--skip-base)
          fi

          python automation/nightly/run_level1.py "${args[@]}"

      - name: Commit runtime outputs
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation_runtime skin_homog/data_skins_big steam_listings/data/float_fit_rel_curves.json

          if git diff --cached --quiet; then
            echo "No nightly output changes to commit."
            exit 0
          fi

          git commit -m "Update nightly runtime [skip ci]"
          if git push; then
            exit 0
          fi

          echo "Push rejected; rebasing runtime commit and retrying."
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
