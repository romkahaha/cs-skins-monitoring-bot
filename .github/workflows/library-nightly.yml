name: Library nightly

on:
  workflow_dispatch:
    inputs:
      skip_risk:
        description: Skip nightly risk rebuild and use automation_runtime/risk_metrics_latest.csv
        required: false
        default: false
        type: boolean
      skip_base:
        description: Skip CSFloat base snapshot refresh
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "15,35,50 22,23 * * *"

permissions:
  contents: write

concurrency:
  group: automation-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nightly-level1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SKIP_RISK: ${{ github.event.inputs.skip_risk || 'false' }}
      SKIP_BASE: ${{ github.event.inputs.skip_base || 'true' }}
      STEAM_COOKIES: ${{ secrets.STEAM_COOKIES }}
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      CSFLOAT_API_KEY_2: ${{ secrets.CSFLOAT_API_KEY_2 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Rebase runtime state
        run: git pull --rebase

      - name: Nightly schedule gate
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" != "schedule" ]]; then
            echo "run_nightly=true" >> "$GITHUB_OUTPUT"
            echo "Manual run: schedule gate bypassed."
            exit 0
          fi

          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/Prague"))
          state_path = Path("automation_runtime/nightly_schedule_state.json")
          last_success = None
          if state_path.is_file():
              try:
                  last_success = json.loads(state_path.read_text(encoding="utf-8")).get("last_success_local_date")
              except Exception:
                  last_success = None

          allowed_window = now.hour in (0, 1) and 15 <= now.minute <= 59
          already_done = last_success == now.date().isoformat()
          run_nightly = allowed_window and not already_done

          print(f"run_nightly={'true' if run_nightly else 'false'}")
          print(f"local_time={now.isoformat()}")
          print(f"allowed_window={'true' if allowed_window else 'false'}")
          print(f"already_done={'true' if already_done else 'false'}")
          PY

      - name: Run nightly level 1
        if: steps.gate.outputs.run_nightly != 'false'
        shell: bash
        run: |
          set -euo pipefail

          args=()
          if [[ "$SKIP_RISK" == "true" ]]; then
            args+=(--skip-risk)
          else
            args+=(--run-risk)
          fi

          if [[ "$SKIP_BASE" == "true" ]]; then
            args+=(--skip-base)
          fi

          python automation/nightly/run_level1.py "${args[@]}"

      - name: Mark nightly schedule success
        if: github.event_name == 'schedule' && steps.gate.outputs.run_nightly != 'false'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p automation_runtime
          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/Prague"))
          payload = {
              "last_success_local_date": now.date().isoformat(),
              "last_success_local_time": now.isoformat(),
          }
          Path("automation_runtime/nightly_schedule_state.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit runtime outputs
        if: steps.gate.outputs.run_nightly != 'false'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation_runtime skin_homog/data_skins_big steam_listings/data/float_fit_rel_curves.json

          if git diff --cached --quiet; then
            echo "No nightly output changes to commit."
            exit 0
          fi

          git commit -m "Update nightly runtime [skip ci]"
          if git push; then
            exit 0
          fi

          echo "Push rejected; rebasing runtime commit and retrying."
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
