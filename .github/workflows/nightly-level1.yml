name: Nightly level 1

on:
  workflow_dispatch:
    inputs:
      skip_base:
        description: Skip CSFloat base snapshot refresh
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 23 * * *"

permissions:
  contents: write

concurrency:
  group: automation-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nightly-level1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SKIP_BASE: ${{ github.event.inputs.skip_base || 'false' }}
      STEAM_COOKIES: ${{ secrets.STEAM_COOKIES }}
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      CSFLOAT_API_KEY_2: ${{ secrets.CSFLOAT_API_KEY_2 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Rebase runtime state
        run: git pull --rebase

      - name: Run nightly level 1
        shell: bash
        run: |
          set -euo pipefail

          args=(--skip-risk)

          if [[ "$SKIP_BASE" == "true" ]]; then
            args+=(--skip-base)
          fi

          python automation/nightly/run_level1.py "${args[@]}"

      - name: Commit runtime outputs
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation_runtime

          if git diff --cached --quiet; then
            echo "No automation_runtime changes to commit."
            exit 0
          fi

          git commit -m "Update nightly runtime [skip ci]"
          git push
