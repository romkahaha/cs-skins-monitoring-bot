name: CSFloat smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/csfloat-smoke.yml

permissions:
  contents: write

jobs:
  csfloat-smoke:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      CSFLOAT_API_KEY_2: ${{ secrets.CSFLOAT_API_KEY_2 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check CSFloat secrets and API
        shell: python
        run: |
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          import urllib.parse
          import urllib.request

          out_path = Path("automation_runtime/csfloat_smoke_latest.json")
          out_path.parent.mkdir(parents=True, exist_ok=True)
          url = "https://csfloat.com/api/v1/listings?" + urllib.parse.urlencode(
              {
                  "market_hash_name": "AK-47 | Redline (Field-Tested)",
                  "sort_by": "lowest_price",
                  "limit": "1",
                  "type": "buy_now",
              }
          )

          failed = False
          checks = []
          for name in ("CSFLOAT_API_KEY", "CSFLOAT_API_KEY_2"):
              key = os.environ.get(name, "").strip()
              if not key:
                  print(f"{name}: missing")
                  checks.append({"name": name, "set": False, "status_code": None, "ok": False, "body_head": "missing"})
                  failed = True
                  continue
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0",
                      "Authorization": key,
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      status = response.status
                      body = response.read(200).decode("utf-8", errors="replace")
              except urllib.error.HTTPError as exc:
                  status = exc.code
                  body = exc.read(200).decode("utf-8", errors="replace")
              except Exception as exc:
                  print(f"{name}: request failed: {type(exc).__name__}")
                  checks.append({"name": name, "set": True, "status_code": None, "ok": False, "body_head": type(exc).__name__})
                  failed = True
                  continue

              ok = status == 200
              print(f"{name}: http {status} ({'ok' if ok else 'failed'})")
              if not ok:
                  print(f"{name}: body head: {body}")
                  failed = True
              checks.append({"name": name, "set": True, "status_code": status, "ok": ok, "body_head": body[:200]})

          payload = {
              "status": "failure" if failed else "success",
              "checked_at_utc": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "github_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "github_sha": os.environ.get("GITHUB_SHA", ""),
              "checks": checks,
          }
          out_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

      - name: Commit smoke result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation_runtime/csfloat_smoke_latest.json
          if git diff --cached --quiet; then
            echo "No smoke result changes to commit."
            exit 0
          fi
          git commit -m "Update CSFloat smoke result [skip ci]"
          git push

      - name: Fail on smoke failure
        shell: python
        run: |
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path("automation_runtime/csfloat_smoke_latest.json").read_text(encoding="utf-8"))
          if payload.get("status") != "success":
              sys.exit(1)
