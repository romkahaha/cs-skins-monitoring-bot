name: Reading cycle

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: Number of monitor-list items per batch
        required: false
        default: "5"
      telegram_mode:
        description: Telegram mode for this cycle
        required: false
        default: real
        type: choice
        options:
          - dry-run
          - real
          - off
      max_runtime_minutes:
        description: Max runtime for this cycle job
        required: false
        default: "330"
      max_batches:
        description: Optional max batches for manual tests
        required: false
        default: ""
      max_cycles:
        description: Optional max full-list cycles for manual tests
        required: false
        default: ""
permissions:
  contents: write

concurrency:
  group: automation-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      BATCH_SIZE: ${{ github.event.inputs.batch_size || '5' }}
      TELEGRAM_MODE: ${{ github.event.inputs.telegram_mode || 'real' }}
      MAX_RUNTIME_MINUTES: ${{ github.event.inputs.max_runtime_minutes || '330' }}
      MAX_BATCHES: ${{ github.event.inputs.max_batches || '' }}
      MAX_CYCLES: ${{ github.event.inputs.max_cycles || '' }}
      STEAM_COOKIES: ${{ secrets.STEAM_COOKIES }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Rebase runtime state
        run: git pull --rebase

      - name: Configure runtime commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run monitoring cycle
        shell: bash
        run: |
          set -euo pipefail

          args=(--batch-size "$BATCH_SIZE" --max-runtime-minutes "$MAX_RUNTIME_MINUTES")
          case "$TELEGRAM_MODE" in
            dry-run)
              args+=(--telegram-dry-run)
              ;;
            real)
              args+=(--send-telegram)
              ;;
            off)
              ;;
            *)
              echo "Unknown TELEGRAM_MODE=$TELEGRAM_MODE" >&2
              exit 2
              ;;
          esac

          if [[ -n "$MAX_BATCHES" ]]; then
            args+=(--max-batches "$MAX_BATCHES")
          fi
          if [[ -n "$MAX_CYCLES" ]]; then
            args+=(--max-cycles "$MAX_CYCLES")
          fi

          python -B automation/monitoring/run_cycle.py "${args[@]}"

      - name: Final runtime commit
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          git add automation_runtime

          if git diff --cached --quiet; then
            echo "No automation_runtime changes to commit."
            exit 0
          fi

          git commit -m "Update monitoring runtime [skip ci]"
          git push
