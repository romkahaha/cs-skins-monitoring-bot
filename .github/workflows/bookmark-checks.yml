name: Bookmark checks

on:
  workflow_dispatch:
    inputs:
      force_bad_cookies:
        description: Use intentionally invalid Steam cookies
        required: false
        default: false
        type: boolean
      force_failure_for_test:
        description: Force a failure after startup to test Telegram alerts
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:
  library-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: automation-runtime-${{ github.ref }}
      cancel-in-progress: false
    env:
      STEAM_COOKIES: ${{ secrets.STEAM_COOKIES }}
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      CSFLOAT_API_KEY_2: ${{ secrets.CSFLOAT_API_KEY_2 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Rebase runtime state
        run: git pull --rebase

      - name: Nightly schedule gate
        id: gate
        shell: bash
        run: python -B automation/nightly/schedule_gate.py --mode nightly >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.gate.outputs.run_nightly != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.gate.outputs.run_nightly != 'false'
        run: python -m pip install -r requirements.txt

      - name: Run nightly level 1
        if: steps.gate.outputs.run_nightly != 'false'
        shell: bash
        run: python automation/nightly/run_level1.py --run-risk --skip-base

      - name: Mark nightly schedule success
        if: steps.gate.outputs.run_nightly != 'false'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p automation_runtime
          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/Prague"))
          payload = {
              "last_success_local_date": now.date().isoformat(),
              "last_success_local_time": now.isoformat(),
          }
          Path("automation_runtime/nightly_schedule_state.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit nightly runtime
        if: steps.gate.outputs.run_nightly != 'false'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation_runtime skin_homog/data_skins_big steam_listings/data/float_fit_rel_curves.json

          if git diff --cached --quiet; then
            echo "No nightly output changes to commit."
            exit 0
          fi

          git commit -m "Update nightly runtime [skip ci]"
          if git push; then
            exit 0
          fi

          echo "Push rejected; rebasing runtime commit and retrying."
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push

  steam-cookies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      STEAM_COOKIES: ${{ secrets.STEAM_COOKIES }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FORCE_BAD_COOKIES: ${{ github.event.inputs.force_bad_cookies || 'false' }}
      FORCE_FAILURE_FOR_TEST: ${{ github.event.inputs.force_failure_for_test || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Steam cookie health check
        shell: bash
        run: |
          set -euo pipefail

          args=()
          if [[ "$FORCE_BAD_COOKIES" == "true" ]]; then
            args+=(--force-bad-cookies)
          fi
          if [[ "$FORCE_FAILURE_FOR_TEST" == "true" ]]; then
            args+=(--force-failure-for-test)
          fi

          python -B automation/health/check_steam_cookies.py "${args[@]}"

