name: Server CSFloat nightly

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - automation_runtime/risk_metrics_latest.csv
      - automation_runtime/risk_candidates_latest.csv
      - automation_runtime/risk_runtime_latest.json
      - automation_runtime/model_coverage_latest.csv
      - automation_runtime/model_backfill_queue_latest.csv
      - automation_runtime/model_backfill_queue_latest.py
      - automation_runtime/server_pipeline_status_latest.json

permissions:
  contents: write

concurrency:
  group: server-csfloat-nightly-main
  cancel-in-progress: false

jobs:
  csfloat-worker:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      CSFLOAT_API_KEY_2: ${{ secrets.CSFLOAT_API_KEY_2 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run CSFloat worker
        shell: bash
        run: server_scripts/github_csfloat_worker.sh
