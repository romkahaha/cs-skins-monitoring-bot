name: Base snapshot

on:
  workflow_dispatch:
    inputs:
      delay_min_sec:
        description: Optional delay minimum override
        required: false
        default: ""
      delay_max_sec:
        description: Optional delay maximum override
        required: false
        default: ""
  schedule:
    - cron: "30 4 * * *"

permissions:
  contents: write

concurrency:
  group: automation-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  base-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DELAY_MIN_SEC: ${{ github.event.inputs.delay_min_sec || '' }}
      DELAY_MAX_SEC: ${{ github.event.inputs.delay_max_sec || '' }}
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      CSFLOAT_API_KEY_2: ${{ secrets.CSFLOAT_API_KEY_2 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Rebase runtime state
        run: git pull --rebase

      - name: Run base snapshot
        shell: bash
        run: |
          set -euo pipefail

          args=()
          if [[ -n "$DELAY_MIN_SEC" ]]; then
            args+=(--delay-min-sec "$DELAY_MIN_SEC")
          fi
          if [[ -n "$DELAY_MAX_SEC" ]]; then
            args+=(--delay-max-sec "$DELAY_MAX_SEC")
          fi

          python -B automation/base/run_snapshot.py "${args[@]}"

      - name: Commit base snapshot
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation_runtime/base_snapshot_latest.csv

          if git diff --cached --quiet; then
            echo "No base snapshot changes to commit."
            exit 0
          fi

          git commit -m "Update base snapshot [skip ci]"
          git push

